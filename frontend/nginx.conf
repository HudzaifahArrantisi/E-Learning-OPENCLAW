# ============================================================
# Nginx Configuration for React Router (SPA)
# Handles: client-side routing, gzip compression, caching
# ============================================================

server {
    listen       80;
    server_name  localhost;

    # Root directory for static files
    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── React Router: SPA Fallback ────────────────────────────
    # All non-file requests fall back to index.html
    # This is CRITICAL for client-side routing to work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Assets: Long-term Cache ────────────────────────
    # Vite generates hashed filenames, so we can cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Error Pages ───────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
