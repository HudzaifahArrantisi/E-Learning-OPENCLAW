# ============================================================
# NGINX HARDENED CONFIG — andromedahub.my.id
# ============================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {

    # =====================
    # BASIC SETTINGS
    # =====================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;   # 🔥 hide nginx version (ANTI SHODAN)

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    types_hash_max_size 4096;

    # =====================
    # LOGGING
    # =====================
    log_format structured
        '$time_iso8601 | $request_method $uri | '
        'status=$status | time=${request_time}s | '
        'ip=$remote_addr | size=$body_bytes_sent';

    access_log /var/log/nginx/access.log structured;

    # =====================
    # GZIP OPTIMIZATION
    # =====================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # =====================
    # RATE LIMIT (ANTI BOT)
    # =====================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # =====================
    # UPSTREAM DOCKER
    # =====================
    upstream backend {
        server openclaw_backend:8080;
        keepalive 32;
    }

    # ============================================================
    # HTTP → HTTPS REDIRECT
    # ============================================================

    server {
        listen 80;
        server_name andromedahub.my.id www.andromedahub.my.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://www.andromedahub.my.id$request_uri;
    }

    server {
        listen 80;
        server_name api.andromedahub.my.id claw.andromedahub.my.id;

        return 301 https://$host$request_uri;
    }

    # ============================================================
    # MAIN WEBSITE
    # ============================================================

    server {

        listen 443 ssl http2;
        server_name andromedahub.my.id www.andromedahub.my.id;

        ssl_certificate     /etc/letsencrypt/live/andromedahub.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/andromedahub.my.id/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_prefer_server_ciphers off;

        # =====================
        # SECURITY HEADERS 🔥
        # =====================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        add_header Content-Security-Policy "
            default-src 'self';
            img-src 'self' data: https:;
            script-src 'self' 'unsafe-inline' https:;
            style-src 'self' 'unsafe-inline' https:;
            font-src 'self' https:;
        " always;

        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 50M;

        # =====================
        # HEALTH CHECK
        # =====================
        location = /health {
            proxy_pass http://backend;
            include proxy_params;
        }

        # =====================
        # API
        # =====================
        location /api/ {

            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass http://backend;
            include proxy_params;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # =====================
        # UPLOAD CACHE
        # =====================
        location /uploads/ {

            proxy_pass http://backend;
            include proxy_params;

            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # =====================
        # FRONTEND
        # =====================
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ============================================================
    # API SUBDOMAIN REDIRECT
    # ============================================================

    server {
        listen 443 ssl http2;
        server_name api.andromedahub.my.id;

        ssl_certificate     /etc/letsencrypt/live/api.andromedahub.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.andromedahub.my.id/privkey.pem;

        return 301 https://www.andromedahub.my.id$request_uri;
    }

    # ============================================================
    # CLAW ADMIN PANEL (PROTECTED)
    # ============================================================

    server {

        listen 443 ssl http2;
        server_name claw.andromedahub.my.id;

        ssl_certificate     /etc/letsencrypt/live/claw.andromedahub.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/claw.andromedahub.my.id/privkey.pem;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {

            proxy_pass http://host.docker.internal:18789/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            include proxy_params;

            proxy_read_timeout 120s;
        }
    }
}
