# ============================================================
# nginx.conf — Reverse Proxy for andromedahub.my.id
#
# Routes:
#   /api/*     → backend:8080
#   /health    → backend:8080
#   /uploads/* → backend:8080
#
# Features:
#   ✅ SSL termination (Let's Encrypt)
#   ✅ CORS for https://www.andromedahub.my.id
#   ✅ Rate limiting (10 req/sec)
#   ✅ Security headers
#   ✅ Gzip compression
#   ✅ Structured access logs
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────
    # 📝 Custom Log Format
    # Shows: timestamp, method, path, status, response_time, client_ip
    # ──────────────────────────────────────────
    log_format structured '$time_iso8601 | $request_method $uri | '
                          'status=$status | time=${request_time}s | '
                          'ip=$remote_addr | size=$body_bytes_sent | '
                          'ref=$http_referer';

    access_log /var/log/nginx/access.log structured;

    # ──────────────────────────────────────────
    # ⚡ Performance
    # ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ──────────────────────────────────────────
    # 📦 Gzip Compression
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ──────────────────────────────────────────
    # 🚦 Rate Limiting — 10 requests/second per IP
    # ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ──────────────────────────────────────────
    # Upstream backend (internal Docker network)
    # ──────────────────────────────────────────
    upstream backend {
        server openclaw_backend:8080;
    }

    # ──────────────────────────────────────────
    # 🔀 HTTP → HTTPS redirect
    # ──────────────────────────────────────────
    server {
        listen 80;
        server_name andromedahub.my.id www.andromedahub.my.id;

        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────
    # 🔒 HTTPS Server
    # ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name andromedahub.my.id www.andromedahub.my.id;

        # ── SSL Certificates (Let's Encrypt) ──
        ssl_certificate     /etc/letsencrypt/live/andromedahub.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/andromedahub.my.id/privkey.pem;

        # ── SSL Security Settings ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Request Size Limit (for file uploads) ──
        client_max_body_size 50M;

        # ──────────────────────────────────────
        # 🩺 /health → backend
        # ──────────────────────────────────────
        location = /health {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────
        # 📡 /api/* → backend
        # ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # CORS Headers
            add_header 'Access-Control-Allow-Origin' 'https://www.andromedahub.my.id' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Length, Content-Type, Authorization, Accept, X-Requested-With, X-Internal-Key' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '43200' always;

            # Handle preflight OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://www.andromedahub.my.id' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Length, Content-Type, Authorization, Accept, X-Requested-With, X-Internal-Key' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '43200' always;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' '0';
                return 204;
            }

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for large file uploads
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ──────────────────────────────────────
        # 📁 /uploads/* → backend
        # ──────────────────────────────────────
        location /uploads/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static uploads
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ──────────────────────────────────────
        # 🚫 Default — reject all other paths
        # ──────────────────────────────────────
        location / {
            return 444;
        }
    }
}
