# ============================================================
# docker-compose.yml — VPS Production
#
# Services:
#   1. openclaw_backend  — Go API (internal, port 8080)
#   2. openclaw_gateway  — OpenClaw CLI gateway (24/7)
#   3. nginx             — Reverse proxy (public, 80/443)
#
# Frontend: Vercel (https://www.andromedahub.my.id)
# Database: Supabase (external cloud)
#
# USAGE:
#   docker compose up --build -d
#   docker ps
#   ./logs.sh
# ============================================================
services:

  # ────────────────────────────────────────────
  # 🖥️ Backend — Go + Gin API
  # Internal only (no public ports)
  # Nginx proxies /api/*, /health, /uploads/*
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaw_backend
    # ⚠️ No "ports:" — internal only, accessed via nginx
    env_file:
      - ./backend/.env
    environment:
      - GIN_MODE=release
    volumes:
      - backend_uploads:/app/uploads
    restart: always
    networks:
      - app_network
    # ✅ No healthcheck — backend is always ready after start
    # nginx uses simple depends_on instead
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ────────────────────────────────────────────
  # 🦀 OpenClaw Gateway — Runs 24/7
  # Persistent state in Docker volume
  # ────────────────────────────────────────────
  openclaw_gateway:
    build: ./openclaw
    container_name: openclaw_gateway
    volumes:
      - openclaw_data:/root/.openclaw
    restart: always
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ────────────────────────────────────────────
  # 🌐 Nginx — Reverse Proxy (public-facing)
  # SSL via Let's Encrypt
  # Routes: /api/*, /health, /uploads/* → backend
  # ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ────────────────────────────────────────────
# 📦 Volumes
# ────────────────────────────────────────────
volumes:
  openclaw_data:
    driver: local
  backend_uploads:
    driver: local

# ────────────────────────────────────────────
# 🌐 Networks
# ────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
