# ============================================================
# docker-compose.yml — VPS Production (Backend Only)
#
# Frontend is deployed on Vercel (e-learning-openclaw.vercel.app)
# Database is on Supabase (external cloud)
# This file only runs the Go backend in Docker
#
# USAGE:
#   docker compose up --build -d
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaw_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - GIN_MODE=release
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  app_network:
    driver: bridge
