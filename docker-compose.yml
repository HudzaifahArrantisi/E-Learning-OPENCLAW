# ============================================================
# docker-compose.yml — VPS Production
#
# Services:
#   1. openclaw_backend  — Go API (internal, port 8080)
#   2. nginx             — Reverse proxy (public, 80/443)
#
# Frontend: Vercel (https://www.andromedahub.my.id)
# Database: Supabase (external cloud)
# OpenClaw Gateway: Running on host (pid managed by systemd)
#
# USAGE:
#   docker compose up --build -d
#   docker ps
#   ./logs.sh
# ============================================================
services:
  # ────────────────────────────────────────────
  # 🖥️ Backend — Go + Gin API
  # Internal only (no public ports)
  # Nginx proxies /api/*, /health, /uploads/*
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaw_backend
    env_file:
      - ./backend/.env
    environment:
      - GIN_MODE=release
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  # ────────────────────────────────────────────
  # 🌐 Nginx — Reverse Proxy (public-facing)
  # SSL via Let's Encrypt
  # Routes: /api/*, /health, /uploads/* → backend
  # ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
# ────────────────────────────────────────────
# 📦 Volumes
# ────────────────────────────────────────────
volumes:
  backend_uploads:
    driver: local
# ────────────────────────────────────────────
# 🌐 Networks
# ────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
